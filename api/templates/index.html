<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ AI 即時雙語同聲翻譯與大會投屏系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-card: rgba(17, 24, 39, 0.7);
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #22c55e;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: var(--accent-red);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        /* 字幕投屏主顯區 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 40px 140px 40px;
            position: relative;
        }

        .subtitle-stage {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .subtitle-box {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .sub-original {
            font-size: 36px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .sub-translated {
            font-size: 40px;
            font-weight: 700;
            color: #a855f7;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.4;
        }

        .no-signal {
            font-size: 24px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* 聲波動畫 */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 40px;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wave-container.active {
            opacity: 1;
        }

        .wave-bar {
            width: 4px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 999px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .wave-bar:nth-child(2) { animation-delay: 0.1s; background-color: #7c3aed; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; background-color: #8b5cf6; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; background-color: #a78bfa; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; background-color: #c084fc; }
        .wave-bar:nth-child(6) { animation-delay: 0.3s; background-color: #a78bfa; }
        .wave-bar:nth-child(7) { animation-delay: 0.2s; background-color: #8b5cf6; }
        .wave-bar:nth-child(8) { animation-delay: 0.1s; background-color: #7c3aed; }

        @keyframes bounce {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(4.5); }
        }

        /* 控制面板 - 固定底欄 */
        .controls-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            z-index: 90;
        }

        .mode-toggle-group {
            display: flex;
            background-color: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-btn {
            padding: 8px 16px;
            font-size: 13px;
            background: none;
            color: var(--text-muted);
            border-radius: 9999px;
            box-shadow: none;
        }

        .mode-btn.active {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            font-weight: 600;
        }

        .status-badge {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-dot.active {
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 字典編輯彈窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .dict-list-wrapper {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .dict-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        input {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            flex: 1;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .btn-icon-delete {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn-icon-delete:hover {
            background-color: var(--accent-red);
            color: white;
        }

        .btn-add-item {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            width: 100%;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn-add-item:hover {
            background-color: var(--primary);
            color: white;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-icon">🎙️</span>
            <div class="logo-text">
                <h1>AI LIVE TRANSLATOR</h1>
                <p>即時同聲雙語字幕系統</p>
            </div>
        </div>
        <div class="nav-actions">
            <button class="btn-secondary" onclick="openDictModal()">
                <span>⚙️</span> 自訂字典
            </button>
        </div>
    </header>

    <main>
        <!-- 聲波動畫 -->
        <div class="wave-container" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <!-- 字幕展示區 -->
        <div class="subtitle-stage" id="subtitleStage">
            <div class="no-signal" id="noSignalText">🎙️ 點擊下方錄音按鈕，開始即時同聲翻譯...</div>
        </div>

        <!-- 控制面板 -->
        <div class="controls-wrapper">
            <div class="mode-toggle-group">
                <button class="mode-btn active" id="modeTalkBtn" onclick="setMode('talk')">手動對講模式</button>
                <button class="mode-btn" id="modeStreamBtn" onclick="setMode('stream')">5秒連續投屏模式</button>
            </div>

            <div style="display: flex; gap: 15px;">
                <button class="btn-primary" id="recordBtn" onclick="toggleRecording()">
                    <span id="recordIcon">⏺️</span> <span id="recordText">開始錄音</span>
                </button>
                <button class="btn-secondary" id="clearBtn" onclick="clearScreen()">
                    <span>🧹</span> 清除畫面
                </button>
            </div>

            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">系統就緒</span>
            </div>
        </div>
    </main>

    <!-- 字典編輯 Modal -->
    <div class="modal-overlay" id="dictModalOverlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>⚙️ 自訂專有名詞字典</h2>
                <button class="close-btn" onclick="closeDictModal()">&times;</button>
            </div>
            
            <div class="dict-list-wrapper" id="dictList">
                <!-- 字典項目動態注入 -->
            </div>

            <button class="btn-add-item" onclick="addDictRow()">+ 新增詞彙對照</button>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeDictModal()">取消</button>
                <button class="btn-primary" onclick="saveDict()">儲存字典</button>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingMode = 'talk'; // 'talk' or 'stream'
        let streamInterval = null;
        const host = window.location.origin;

        // 初始化加載字典
        let dictionary = {};

        async function fetchDictionary() {
            try {
                const res = await fetch(`${host}/api/dictionary`);
                dictionary = await res.json();
            } catch (e) {
                console.error("無法加載字典", e);
            }
        }
        fetchDictionary();

        function setMode(mode) {
            if (isRecording) {
                alert("請先停止錄音再切換模式。");
                return;
            }
            recordingMode = mode;
            document.getElementById('modeTalkBtn').classList.toggle('active', mode === 'talk');
            document.getElementById('modeStreamBtn').classList.toggle('active', mode === 'stream');
        }

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isRecording = true;
                audioChunks = [];
                
                // 設定 UI
                document.getElementById('recordBtn').className = 'btn-danger';
                document.getElementById('recordIcon').innerText = '⏹️';
                document.getElementById('recordText').innerText = '停止錄音';
                document.getElementById('statusDot').className = 'status-dot active';
                document.getElementById('statusText').innerText = '錄音進行中';
                document.getElementById('waveContainer').classList.add('active');
                document.getElementById('noSignalText').innerText = '正在監聽您的聲音...';

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size > 1000) { // 避免過小的雜音檔案
                        await uploadAndTranslate(audioBlob);
                    }
                    audioChunks = [];
                };

                mediaRecorder.start();

                // 如果是連續模式，每 5 秒停止並重啟以進行切片上傳
                if (recordingMode === 'stream') {
                    streamInterval = setInterval(() => {
                        if (mediaRecorder && mediaRecorder.state === "recording") {
                            mediaRecorder.stop();
                            mediaRecorder.start();
                        }
                    }, 5000);
                }

            } catch (err) {
                console.error("無法存取麥克風", err);
                alert("請允許網頁存取您的麥克風以進行錄音。");
                stopRecording();
            }
        }

        function stopRecording() {
            isRecording = false;
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }
            
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                // 關閉麥克風流
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }

            // 還原 UI
            document.getElementById('recordBtn').className = 'btn-primary';
            document.getElementById('recordIcon').innerText = '⏺️';
            document.getElementById('recordText').innerText = '開始錄音';
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').innerText = '系統就緒';
            document.getElementById('waveContainer').classList.remove('active');
        }

        async function uploadAndTranslate(blob) {
            document.getElementById('statusText').innerText = 'AI 轉譯翻譯中...';
            const formData = new FormData();
            formData.append("file", blob, "recording.webm");

            try {
                const res = await fetch(`${host}/api/translate-audio`, {
                    method: "POST",
                    body: formData
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    const errMsg = errData.error || `HTTP 錯誤 ${res.status}`;
                    renderSubtitle("❌ 翻譯服務異常", `${errMsg} (請確認 Vercel 專案設定中是否已配置 GROQ_API_KEY)`);
                    return;
                }
                
                const data = await res.json();
                if (data.error) {
                    renderSubtitle("❌ 翻譯服務異常", `${data.error} (請確認 Vercel 專案設定中是否已配置 GROQ_API_KEY)`);
                } else if (data.original && data.translated) {
                    renderSubtitle(data.original, data.translated);
                }
            } catch (e) {
                console.error("翻譯請求失敗", e);
                renderSubtitle("❌ 網路連線異常", `無法連線至翻譯伺服器: ${e.message}`);
            } finally {
                if (isRecording) {
                    document.getElementById('statusText').innerText = '錄音進行中';
                } else {
                    document.getElementById('statusText').innerText = '系統就緒';
                }
            }
        }

        function renderSubtitle(original, translated) {
            const stage = document.getElementById('subtitleStage');
            
            // 移除 no signal 文字
            const noSignal = document.getElementById('noSignalText');
            if (noSignal) noSignal.remove();

            // 建立字幕盒
            const box = document.createElement('div');
            box.className = 'subtitle-box';
            box.innerHTML = `
                <div class="sub-original">${original}</div>
                <div class="sub-translated">${translated}</div>
            `;

            // 如果已有字幕，只保留最新的一到二個，避免投屏頁面溢出
            if (stage.children.length >= 2) {
                stage.removeChild(stage.firstChild);
            }
            stage.appendChild(box);
        }

        // 字典彈窗邏輯
        function openDictModal() {
            const overlay = document.getElementById('dictModalOverlay');
            overlay.classList.add('active');
            renderDictRows();
        }

        function closeDictModal() {
            document.getElementById('dictModalOverlay').classList.remove('active');
        }

        function renderDictRows() {
            const list = document.getElementById('dictList');
            list.innerHTML = '';
            for (const [k, v] of Object.entries(dictionary)) {
                list.appendChild(createDictRowElement(k, v));
            }
        }

        function clearScreen() {
            const stage = document.getElementById('subtitleStage');
            stage.innerHTML = '<div class="no-signal" id="noSignalText">🎙️ 點擊下方錄音按鈕，開始即時同聲翻譯...</div>';
        }

        function createDictRowElement(key = '', val = '') {
            const row = document.createElement('div');
            row.className = 'dict-row';
            row.innerHTML = `
                <input type="text" placeholder="輸入詞 (如: AI / 算力)" value="${key}" class="dict-key">
                <span style="color: var(--text-muted)">➔</span>
                <input type="text" placeholder="取代為 (如: AI 代理人 / 大腦算力注能)" value="${val}" class="dict-val">
                <button class="btn-icon-delete" onclick="this.parentElement.remove()">&times;</button>
            `;
            return row;
        }

        function addDictRow() {
            const list = document.getElementById('dictList');
            list.appendChild(createDictRowElement());
            // 自動滾動到底部
            list.scrollTop = list.scrollHeight;
        }

        async function saveDict() {
            const keys = document.getElementsByClassName('dict-key');
            const vals = document.getElementsByClassName('dict-val');
            const newDict = {};

            for (let i = 0; i < keys.length; i++) {
                const k = keys[i].value.strip ? keys[i].value.strip() : keys[i].value.trim();
                const v = vals[i].value.strip ? vals[i].value.strip() : vals[i].value.trim();
                if (k) {
                    newDict[k] = v;
                }
            }

            try {
                const res = await fetch(`${host}/api/dictionary`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: jsonStr = JSON.stringify(newDict)
                });
                if (res.ok) {
                    dictionary = newDict;
                    alert("字典儲存成功！");
                    closeDictModal();
                } else {
                    alert("儲存失敗");
                }
            } catch (e) {
                alert("網路異常，儲存失敗");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ AI 即時雙語同聲翻譯與大會投屏系統</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%99%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-card: rgba(17, 24, 39, 0.7);
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #22c55e;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .btn-danger {
            background-color: var(--accent-red);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        /* 字幕投屏主顯區 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 40px 140px 40px;
            position: relative;
        }

        .subtitle-stage {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .subtitle-box {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .sub-original {
            font-size: 36px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .sub-translated {
            font-size: 40px;
            font-weight: 700;
            color: #a855f7;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.4;
        }

        .no-signal {
            font-size: 24px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* 聲波動畫 */
        .wave-container {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 40px;
            margin-bottom: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wave-container.active {
            opacity: 1;
        }

        .wave-bar {
            width: 4px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 999px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .wave-bar:nth-child(2) { animation-delay: 0.1s; background-color: #7c3aed; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; background-color: #8b5cf6; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; background-color: #a78bfa; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; background-color: #c084fc; }
        .wave-bar:nth-child(6) { animation-delay: 0.3s; background-color: #a78bfa; }
        .wave-bar:nth-child(7) { animation-delay: 0.2s; background-color: #8b5cf6; }
        .wave-bar:nth-child(8) { animation-delay: 0.1s; background-color: #7c3aed; }

        @keyframes bounce {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(4.5); }
        }

        /* 控制面板 - 固定底欄 */
        .controls-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            z-index: 90;
        }

        .status-badge {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-dot.active {
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 字典編輯彈窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .dict-list-wrapper {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .dict-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        input {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            flex: 1;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .language-select {
            min-width: 150px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
        }

        .language-select option {
            background-color: #111827;
            color: var(--text-main);
        }

        .btn-icon-delete {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn-icon-delete:hover {
            background-color: var(--accent-red);
            color: white;
        }

        .btn-add-item {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
            width: 100%;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .btn-add-item:hover {
            background-color: var(--primary);
            color: white;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <span class="logo-icon">🎙️</span>
            <div class="logo-text">
                <h1>AI LIVE TRANSLATOR</h1>
                <p>即時同聲雙語字幕系統</p>
            </div>
        </div>
        <div class="nav-actions" style="display: flex; gap: 12px;">
            <button class="btn-secondary" onclick="openKeyModal()">
                <span>🔑</span> 設定金鑰
            </button>
            <button class="btn-secondary" onclick="openDictModal()">
                <span>⚙️</span> 自訂字典
            </button>
        </div>
    </header>

    <main>
        <!-- 聲波動畫 -->
        <div class="wave-container" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <!-- 字幕展示區 -->
        <div class="subtitle-stage" id="subtitleStage">
            <div class="no-signal" id="noSignalText">
                🎙️ 點擊下方錄音按鈕，開始 GPT-Realtime 語音翻譯...
                <div style="font-size: 14px; margin-top: 10px; color: var(--text-muted);">
                    🔑 第一次使用？請先點擊右上角「設定金鑰」配置 OpenAI API 金鑰。
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="controls-wrapper">
            <div style="display: flex; gap: 15px; align-items: center;">
                <select id="targetLanguageSelect" class="language-select" aria-label="輸出語言">
                    <option value="en" selected>輸出 English</option>
                    <option value="ja">輸出 日本語</option>
                    <option value="ko">輸出 한국어</option>
                    <option value="zh">輸出 中文</option>
                    <option value="es">輸出 Español</option>
                    <option value="fr">輸出 Français</option>
                    <option value="de">輸出 Deutsch</option>
                    <option value="it">輸出 Italiano</option>
                    <option value="pt">輸出 Português</option>
                    <option value="vi">輸出 Tiếng Việt</option>
                    <option value="id">輸出 Bahasa Indonesia</option>
                    <option value="hi">輸出 हिन्दी</option>
                </select>
                <button class="btn-primary" id="recordBtn" onclick="toggleRecording()">
                    <span id="recordIcon">⏺️</span> <span id="recordText">開始錄音</span>
                </button>
                <button class="btn-secondary" id="clearBtn" onclick="clearScreen()">
                    <span>🧹</span> 清除畫面
                </button>
            </div>

            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">系統就緒</span>
            </div>
        </div>
    </main>

    <!-- 字典編輯 Modal -->
    <div class="modal-overlay" id="dictModalOverlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>⚙️ 自訂專有名詞字典</h2>
                <button class="close-btn" onclick="closeDictModal()">&times;</button>
            </div>
            
            <div class="dict-list-wrapper" id="dictList">
                <!-- 字典項目動態注入 -->
            </div>

            <button class="btn-add-item" onclick="addDictRow()">+ 新增詞彙對照</button>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeDictModal()">取消</button>
                <button class="btn-primary" onclick="saveDict()">儲存字典</button>
            </div>
        </div>
    </div>

    <!-- 金鑰設定 Modal -->
    <div class="modal-overlay" id="keyModalOverlay">
        <div class="modal-card" style="max-width: 480px;">
            <div class="modal-header">
                <h2>🔑 設定 API 金鑰</h2>
                <button class="close-btn" onclick="closeKeyModal()">&times;</button>
            </div>
            
            <div style="padding: 15px 0;">
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px; line-height: 1.5;">
                    金鑰會保存在您的本地瀏覽器 (localStorage)。啟動 Realtime 時，系統會把 OpenAI 金鑰送至本站後端換取短效 client secret，不會將完整金鑰寫入伺服器檔案。
                </p>
                
                <!-- OpenAI Key Input -->
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 14px; color: var(--primary); margin-bottom: 5px; font-weight: bold;">OpenAI API 金鑰（優先使用，翻譯最精準）</label>
                    <div style="display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);">
                        <input type="password" id="openaiKeyInput" placeholder="sk-proj-..." style="flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; box-shadow: none;">
                        <button id="toggleOpenAIVisibleBtn" onclick="toggleOpenAIKeyVisibility()" style="background: transparent; border: none; color: var(--primary); font-size: 18px; cursor: pointer;">👁️</button>
                    </div>
                    <p style="font-size: 12px; color: var(--primary); margin-top: 5px; margin-bottom: 0;">
                        💡 尚未擁有金鑰？請至 <a href="https://platform.openai.com/api-keys" target="_blank" style="color: var(--primary); text-decoration: underline; cursor: pointer;">platform.openai.com/api-keys</a> 申請。
                    </p>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeKeyModal()">取消</button>
                <button class="btn-primary" onclick="saveApiKey()">儲存金鑰</button>
            </div>
        </div>
    </div>

    <script>
        let isRecording = false;
        let realtimePeerConnection = null;
        let realtimeDataChannel = null;
        let realtimeAudioElement = null;
        let localAudioStream = null;
        let realtimeSubtitleState = { original: '', translated: '' };
        const host = window.location.origin;

        // 初始化加載字典
        let dictionary = {};

        async function fetchDictionary() {
            try {
                const res = await fetch(`${host}/api/dictionary`);
                dictionary = await res.json();
            } catch (e) {
                console.error("無法加載字典", e);
            }
        }
        fetchDictionary();

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            await startRealtimeTranslation();
        }

        async function startRealtimeTranslation() {
            try {
                isRecording = true;
                realtimeSubtitleState = { original: '', translated: '' };
                document.getElementById('recordBtn').className = 'btn-danger';
                document.getElementById('recordIcon').innerText = '⏹️';
                document.getElementById('recordText').innerText = '停止錄音';
                document.getElementById('statusDot').className = 'status-dot active';
                document.getElementById('statusText').innerText = '建立 Realtime 翻譯連線中';
                document.getElementById('waveContainer').classList.add('active');
                const noSignal = document.getElementById('noSignalText');
                if (noSignal) noSignal.innerText = '正在啟動 GPT-Realtime-Translate...';

                const targetLanguage = document.getElementById('targetLanguageSelect').value || 'en';
                const userOpenAIKey = localStorage.getItem('openai_api_key') || '';
                const sessionHeaders = { "Content-Type": "application/json" };
                if (userOpenAIKey) {
                    sessionHeaders['X-OpenAI-API-Key'] = userOpenAIKey;
                }

                const sessionRes = await fetch(`${host}/api/realtime-translation-session`, {
                    method: "POST",
                    headers: sessionHeaders,
                    body: JSON.stringify({ target_language: targetLanguage })
                });
                const sessionData = await sessionRes.json().catch(() => ({}));
                if (!sessionRes.ok) {
                    const errMsg = sessionData.error || `HTTP 錯誤 ${sessionRes.status}`;
                    const keyHint = sessionData.key_hint ? ` ${sessionData.key_hint}` : '';
                    throw new Error(`${errMsg}${keyHint}`);
                }

                const clientSecret = sessionData.value || (sessionData.client_secret && sessionData.client_secret.value);
                if (!clientSecret) {
                    throw new Error("OpenAI 未回傳 Realtime client_secret。");
                }

                localAudioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                realtimePeerConnection = new RTCPeerConnection();
                realtimeAudioElement = document.createElement('audio');
                realtimeAudioElement.autoplay = true;
                realtimePeerConnection.ontrack = event => {
                    realtimeAudioElement.srcObject = event.streams[0];
                };
                realtimePeerConnection.onconnectionstatechange = () => {
                    const state = realtimePeerConnection ? realtimePeerConnection.connectionState : 'closed';
                    if (state === 'connected') {
                        document.getElementById('statusText').innerText = 'Realtime 語音翻譯中';
                    } else if (['failed', 'disconnected', 'closed'].includes(state) && isRecording) {
                        document.getElementById('statusText').innerText = `Realtime 連線狀態: ${state}`;
                    }
                };

                localAudioStream.getAudioTracks().forEach(track => {
                    realtimePeerConnection.addTrack(track, localAudioStream);
                });

                realtimeDataChannel = realtimePeerConnection.createDataChannel("oai-events");
                realtimeDataChannel.onmessage = event => handleRealtimeTranslationEvent(event.data);

                const offer = await realtimePeerConnection.createOffer();
                await realtimePeerConnection.setLocalDescription(offer);

                const sdpRes = await fetch("https://api.openai.com/v1/realtime/translations/calls", {
                    method: "POST",
                    body: offer.sdp,
                    headers: {
                        "Authorization": `Bearer ${clientSecret}`,
                        "Content-Type": "application/sdp"
                    }
                });
                if (!sdpRes.ok) {
                    const errorText = await sdpRes.text();
                    throw new Error(`Realtime WebRTC 連線失敗 (${sdpRes.status}): ${errorText}`);
                }

                await realtimePeerConnection.setRemoteDescription({
                    type: "answer",
                    sdp: await sdpRes.text()
                });
                document.getElementById('statusText').innerText = 'Realtime 語音翻譯中';
            } catch (err) {
                console.error("Realtime 翻譯啟動失敗", err);
                renderSubtitle("❌ Realtime 翻譯服務異常", `${err.message} (請確認 OpenAI 金鑰有效，且專案可使用 gpt-realtime-translate)`);
                stopRealtimeTranslation();
            }
        }

        function handleRealtimeTranslationEvent(rawEvent) {
            let event;
            try {
                event = JSON.parse(rawEvent);
            } catch (e) {
                return;
            }

            if (event.type === 'error') {
                const message = event.error && event.error.message ? event.error.message : JSON.stringify(event);
                renderSubtitle("❌ Realtime 事件錯誤", message);
                return;
            }

            const inputDelta = [event.delta, event.transcript_delta, event.text_delta, event.transcript]
                .find(value => typeof value === 'string' && value.length > 0) || '';
            if (event.type && event.type.includes('input') && event.type.includes('transcript') && inputDelta) {
                updateRealtimeSubtitle('original', inputDelta);
                return;
            }

            if (event.type && event.type.includes('output') && event.type.includes('transcript') && inputDelta) {
                updateRealtimeSubtitle('translated', inputDelta);
            }
        }

        function updateRealtimeSubtitle(field, delta) {
            realtimeSubtitleState[field] += delta;
            const original = realtimeSubtitleState.original || '正在聆聽原文...';
            const translated = realtimeSubtitleState.translated || '正在產生翻譯語音...';
            renderSubtitle(original, translated, true);
        }

        function stopRealtimeTranslation() {
            isRecording = false;
            if (realtimeDataChannel) {
                realtimeDataChannel.close();
                realtimeDataChannel = null;
            }
            if (realtimePeerConnection) {
                realtimePeerConnection.close();
                realtimePeerConnection = null;
            }
            if (localAudioStream) {
                localAudioStream.getTracks().forEach(track => track.stop());
                localAudioStream = null;
            }
            realtimeAudioElement = null;
            document.getElementById('recordBtn').className = 'btn-primary';
            document.getElementById('recordIcon').innerText = '⏺️';
            document.getElementById('recordText').innerText = '開始錄音';
            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').innerText = '系統就緒';
            document.getElementById('waveContainer').classList.remove('active');
        }

        function stopRecording() {
            stopRealtimeTranslation();
        }

        function renderSubtitle(original, translated, replaceLatest = false) {
            const stage = document.getElementById('subtitleStage');
            
            // 移除 no signal 文字
            const noSignal = document.getElementById('noSignalText');
            if (noSignal) noSignal.remove();

            if (replaceLatest && stage.lastElementChild) {
                stage.lastElementChild.innerHTML = `
                    <div class="sub-original">${original}</div>
                    <div class="sub-translated">${translated}</div>
                `;
                return;
            }

            // 建立字幕盒
            const box = document.createElement('div');
            box.className = 'subtitle-box';
            box.innerHTML = `
                <div class="sub-original">${original}</div>
                <div class="sub-translated">${translated}</div>
            `;

            // 如果已有字幕，只保留最新的一到二個，避免投屏頁面溢出
            if (stage.children.length >= 2) {
                stage.removeChild(stage.firstChild);
            }
            stage.appendChild(box);
        }

        // 金鑰彈窗邏輯
        function openKeyModal() {
            const overlay = document.getElementById('keyModalOverlay');
            overlay.classList.add('active');
            
            const savedOpenAIKey = localStorage.getItem('openai_api_key') || '';
            document.getElementById('openaiKeyInput').value = savedOpenAIKey;
        }

        function closeKeyModal() {
            document.getElementById('keyModalOverlay').classList.remove('active');
        }

        function toggleOpenAIKeyVisibility() {
            const input = document.getElementById('openaiKeyInput');
            const btn = document.getElementById('toggleOpenAIVisibleBtn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = '🔒';
            } else {
                input.type = 'password';
                btn.innerText = '👁️';
            }
        }

        function saveApiKey() {
            const openaiKey = document.getElementById('openaiKeyInput').value.trim();
            localStorage.setItem('openai_api_key', openaiKey);
            
            alert("API 金鑰已儲存至您的本地瀏覽器！");
            closeKeyModal();
        }

        // 字典彈窗邏輯
        function openDictModal() {
            const overlay = document.getElementById('dictModalOverlay');
            overlay.classList.add('active');
            renderDictRows();
        }

        function closeDictModal() {
            document.getElementById('dictModalOverlay').classList.remove('active');
        }

        function renderDictRows() {
            const list = document.getElementById('dictList');
            list.innerHTML = '';
            for (const [k, v] of Object.entries(dictionary)) {
                list.appendChild(createDictRowElement(k, v));
            }
        }

        function clearScreen() {
            const stage = document.getElementById('subtitleStage');
            stage.innerHTML = `
                <div class="no-signal" id="noSignalText">
                    🎙️ 點擊下方錄音按鈕，開始 GPT-Realtime 語音翻譯...
                    <div style="font-size: 14px; margin-top: 10px; color: var(--text-muted);">
                        🔑 第一次使用？請先點擊右上角「設定金鑰」配置 OpenAI API 金鑰。
                    </div>
                </div>
            `;
        }

        function createDictRowElement(key = '', val = '') {
            const row = document.createElement('div');
            row.className = 'dict-row';
            row.innerHTML = `
                <input type="text" placeholder="輸入詞 (如: AI / 算力)" value="${key}" class="dict-key">
                <span style="color: var(--text-muted)">➔</span>
                <input type="text" placeholder="取代為 (如: AI 代理人 / 大腦算力注能)" value="${val}" class="dict-val">
                <button class="btn-icon-delete" onclick="this.parentElement.remove()">&times;</button>
            `;
            return row;
        }

        function addDictRow() {
            const list = document.getElementById('dictList');
            list.appendChild(createDictRowElement());
            // 自動滾動到底部
            list.scrollTop = list.scrollHeight;
        }

        async function saveDict() {
            const keys = document.getElementsByClassName('dict-key');
            const vals = document.getElementsByClassName('dict-val');
            const newDict = {};

            for (let i = 0; i < keys.length; i++) {
                const k = keys[i].value.strip ? keys[i].value.strip() : keys[i].value.trim();
                const v = vals[i].value.strip ? vals[i].value.strip() : vals[i].value.trim();
                if (k) {
                    newDict[k] = v;
                }
            }

            try {
                const res = await fetch(`${host}/api/dictionary`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: jsonStr = JSON.stringify(newDict)
                });
                if (res.ok) {
                    dictionary = newDict;
                    alert("字典儲存成功！");
                    closeDictModal();
                } else {
                    alert("儲存失敗");
                }
            } catch (e) {
                alert("網路異常，儲存失敗");
            }
        }
    </script>
</body>
</html>
